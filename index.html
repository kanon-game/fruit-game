<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フルーツ当てゲーム（音声強化版）</title>
<style>

body {
  margin: 0;
  text-align: center;
}

canvas {
  height: auto;
  max-width: 600px;
}

body { text-align:center; font-family:sans-serif; }
#question { width:180px; }
.choices { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; max-width:420px; margin:20px auto; }
.choices img { width:100%; cursor:pointer; }
#result { font-size:24px; margin-top:20px; height:40px; }
.correct { color:green; animation:pop 0.5s ease; }
.wrong { color:red; animation:shake 0.5s ease; }
@keyframes pop { 0%{transform:scale(0.5);} 100%{transform:scale(1);} }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
</style>
</head>
<body>

<h1>このフルーツはどれ？</h1>
<img id="question">

<div class="choices" id="choices"></div>
<p id="result"></p>

<script>
const fruits = [
  {name:"バナナ", file:"banana"},
  {name:"りんご", file:"apple"},
  {name:"イチゴ", file:"strawberry"},
  {name:"みかん", file:"orange"},
  {name:"ぶどう", file:"grape"},
  {name:"キウイフルーツ", file:"kiwi"},
  {name:"もも", file:"peach"},
  {name:"かき", file:"persimmon"},
  {name:"すいか", file:"watermelon"}
];

let correct = "";

// 効果音
const correctSE = new Audio("sounds/correct.mp3");
const wrongSE = new Audio("sounds/Incorrect.mp3");

// 正解ボイス
const correctVoices = [
  new Audio("sounds/sugoi.mp3"),
  new Audio("sounds/yokudekimashita.mp3"),
  new Audio("sounds/omedetou.mp3")
];

// 不正解ボイス
const wrongVoices = [
  new Audio("sounds/hazure.mp3"),
  new Audio("sounds/oshii.mp3"),
  new Audio("sounds/zannen.mp3")
];

//フルーツ読み上げ
const fruitVoices = {
  apple: "sounds/apple.wav",
  banana: "sounds/banana.wav",
  orange: "sounds/orange.wav",
  grape: "sounds/grape.wav",
  strawberry: "sounds/strawberry.wav",
  watermelon: "sounds/watermelon.wav",
  peach: "sounds/peach.wav",
  persimmon: "sounds/persimmon.wav",
  kiwi: "sounds/kiwi.wav"
};

function playCorrectSound() {
  const voice = correctVoices[Math.floor(Math.random()*correctVoices.length)];

  correctSE.currentTime = 0;
  correctSE.play();

  correctSE.onended = () => {
    voice.currentTime = 0;
    voice.play();
  };
}

function playWrongSound() {
  const voice = wrongVoices[Math.floor(Math.random()*wrongVoices.length)];

  wrongSE.currentTime = 0;
  wrongSE.play();

  wrongSE.onended = () => {
    voice.currentTime = 0;
    voice.play();
  };
}

function newQuestion() {
  const q = fruits[Math.floor(Math.random()*fruits.length)];
  correct = q.file;

  document.getElementById("question").src = "images/"+q.file+".jpg";

  const shuffled = [...fruits].sort(()=>0.5-Math.random());
  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  shuffled.forEach(f=>{
    const img = document.createElement("img");
    img.src = "images/"+f.file+"2.jpg";
    img.onclick = ()=>checkAnswer(f.file);
    choices.appendChild(img);
  });

  document.getElementById("result").textContent = "";
}

function checkAnswer(answer) {
  const result = document.getElementById("result");

  if (answer === correct) {

    result.textContent = "せいかい！";
    result.className = "correct";

    const voice = correctVoices[Math.floor(Math.random()*correctVoices.length)];

    // ① ピンポーン
    correctSE.currentTime = 0;
    correctSE.play();

    // ② 正解ボイス
    setTimeout(() => {
      voice.currentTime = 0;
      voice.play();
    }, 700);

    // ③ フルーツ名
    setTimeout(() => {
      new Audio(fruitVoices[correct]).play();
    }, 1500);

  } else {

    result.textContent = "ざんねん";
    result.className = "wrong";

    playWrongSound();
  }

  setTimeout(newQuestion, 2200);
}

newQuestion();
</script>

</body>
</html>
